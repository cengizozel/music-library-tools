# Beets config — tags and organizes music into the library in one step.
# Accepts any messy input structure. Outputs a clean, consistently named library.
#
# Usage:
#   venv/bin/beet -c beets/config.yaml import /path/to/incoming/music

# Set this to your actual library directory
directory: /Users/cengizozel/Documents/Projects/music-library-tools/sample_library
library: ~/.config/beets/music-library-tools.db

import:
  move: yes         # move files out of _Staging into the library
  write: yes        # write corrected tags to files
  timid: no
  quiet_fallback: asis  # if no strong match found, keep existing tags and move anyway
  log: ~/.config/beets/import.log
  languages: en

# Naming convention — matches our library layout
# Single-disc:  Artist/[Year] Album/01 - Title.ext
# Multi-disc:   Artist/[Year] Album/101 - Title.ext
# Compilation:  Various Artists/[Year] Album/01 - Title.ext
# Singleton:    Artist/[Year] Title/01 - Title.ext
paths:
  mb_albumid::^$: _Staging/$albumartist/[$year] $album/$track - $title
  default: $albumartist/[$year] $album/$track - $title
  comp:    Various Artists/[$year] $album/$track - $title
  singleton: $albumartist/[$year] $title/$track - $title

plugins:
  - musicbrainz     # MusicBrainz metadata source (required for autotagger)
  - chroma          # acoustic fingerprinting (needs chromaprint: brew install chromaprint)
  - fetchart        # download cover art
  - embedart        # embed cover art into files
  - mbsync          # re-sync tags using existing MusicBrainz IDs
  - missing         # report missing tracks in albums
  - duplicates      # find duplicate tracks

musicbrainz:
  searchlimit: 10

match:
  strong_rec_thresh: 0.40   # auto-accept matches with distance ≤ 0.40 (~60%+ similarity)

chroma:
  auto: yes
  fpcalc: /opt/homebrew/bin/fpcalc

fetchart:
  auto: yes
  sources:
    - coverart       # Cover Art Archive (MusicBrainz)
    - itunes
    - amazon

embedart:
  auto: yes
  ifempty: yes      # only embed if no art already present
